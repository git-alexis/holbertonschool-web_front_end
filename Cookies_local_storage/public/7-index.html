<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>Cookies & local storage</title>
        <script type="application/javascript">
            const availableItems = ["Shampoo","Soap","Sponge","Water"];

            function getCartFromStorage() {
                const cart = sessionStorage.getItem("cart");
                if (!cart) {
                    return {};
                }
                return JSON.parse(cart);
            }

            function addItemToCart(item) {
                const cart = getCartFromStorage();
                if (cart[item]) {
                    cart[item] += 1;
                } else {
                    cart[item] = 1;
                }
                sessionStorage.setItem("cart", JSON.stringify(cart));
                displayCart();
            }

            function removeItemfromCart(item) {
                const cart = getCartFromStorage();
                delete cart[item];
                sessionStorage.setItem("cart", JSON.stringify(cart));
                displayCart();
            }

            function clearCart() {
                sessionStorage.clear();
                displayCart();
            }

            function createStore() {
                const h2 = document.createElement("h2");
                h2.innerHTML = "Available products:";
                document.body.appendChild(h2);

                const ul = document.createElement("ul");
                document.body.appendChild(ul);

                for (const item of availableItems) {
                    const li = document.createElement("li");
                    li.innerHTML = item;
                    li.style.cursor = "pointer";
                    li.addEventListener("click", () => {
                        addItemToCart(item);
                    });
                    ul.appendChild(li);
                }
            }

            function displayCart() {
                if (document.getElementsByTagName("h2").length == 1) {
                    const h2 = document.createElement("h2");
                    h2.innerHTML = "Your cart:";
                    document.body.appendChild(h2);
                }

                if (document.getElementsByTagName("div").length == 0) {
                    const div = document.createElement("div");
                    document.body.appendChild(div);
                }
                else {
                    document.getElementsByTagName("div")[0].innerHTML = "";
                }
                updateCart();
            }

            function updateCart() {
                const div = document.getElementsByTagName("div")[0];
                const ul = document.createElement("ul");
                div.appendChild(ul);

                const cart = getCartFromStorage();
                const cartKeys = Object.keys(cart);
                if (cartKeys.length === 0) {
                    const li = document.createElement("li");
                    li.innerHTML = "Your cart is empty";
                    ul.appendChild(li);
                }
                else {
                    const clearLi = document.createElement("li");
                    clearLi.innerHTML = "Clear my cart";
                    clearLi.style.cursor = "pointer";
                    clearLi.onclick = function () {
                        clearCart();
                    };
                    ul.appendChild(clearLi);

                    for (const item of cartKeys) {
                        const li = document.createElement("li");
                        li.innerHTML = item + " x " + cart[item] + " ";

                        const removeSpan = document.createElement("span");
                        removeSpan.textContent = "(remove)";
                        removeSpan.style.cursor = "pointer";

                        removeSpan.onclick = function () {
                            removeItemfromCart(item);
                        };

                        li.appendChild(removeSpan);
                        ul.appendChild(li);
                    }
                }
            }

            window.onload = function () {
                if (typeof(Storage) === "undefined") {
                    alert("Sorry, your browser does not support Web storage. Try again with a better one");
                } else {
                    createStore();
                    displayCart();
                }
            };
        </script>
    </head>
    <body>
    </body>
</html>
