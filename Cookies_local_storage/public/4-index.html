<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>Cookies & local storage</title>
        <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
        <script type="application/javascript">
            function setCookies() {
                const firstname = document.getElementById("firstname").value;
                const email = document.getElementById("email").value;
                Cookies.set("firstname", firstname, {expires: 10, path: "/"});
                Cookies.set("email", email, {expires: 10, path: "/"});
            }

            function showForm() {
                if (document.getElementsByTagName("h1").length == 1) {
                    const message = document.getElementsByTagName("h1")[0];
                    message.remove();
                }
                const loginForm = document.getElementById("loginForm");
                loginForm.style.display = "block";

                document.getElementById("firstname").value = "";
                document.getElementById("email").value = "";
            }

            function hideForm() {
                const loginForm = document.getElementById("loginForm");
                loginForm.style.display = "none";
            }

            function deleteCookiesAndShowForm() {
                Cookies.remove("firstname", { path: "/" });
                Cookies.remove("email", { path: "/" });
                showForm();
            }

            function showWelcomeMessageOrForm() {
                if (Cookies.get("firstname") == "") {
                    showForm();
                }
                else {
                    const h1 = document.createElement("h1");
                    h1.innerHTML = "Welcome: " + Cookies.get("firstname");
                    const a = document.createElement("a");
                    a.setAttribute("onclick","deleteCookiesAndShowForm()");
                    a.innerHTML = "(logout)";
                    a.style.fontWeight = "normal";
                    a.style.fontStyle = "italic";
                    a.style.marginLeft = "10px";
                    a.style.cursor = "pointer";
                    h1.appendChild(a);
                    document.body.appendChild(h1);

                    hideForm();
                }
            }
        </script>
    </head>
    <body>
        <div id="loginForm">
            <h2>Login to the website</h2>
            <input type="text" id="firstname" placeholder="Firstname"></input>
            <input type="text" id="email" placeholder="Email"></input>
            <button onclick="setCookies(); showWelcomeMessageOrForm();">Log me in</button>
        </div>
    </body>
</html>
