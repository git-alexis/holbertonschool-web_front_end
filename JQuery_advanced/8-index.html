<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8" />
        <title>Task 8</title>
        <!-- jQuery Minified with AJAX -->
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script type="application/javascript">
            function createSearchForm() {
                $('body').append(
                    $('<input>').attr('type', 'text'),
                    $('<input>').attr('type', 'submit').click(function () {
                        const search = $('input:first').val();
                        queryWikipedia(search);
                    }),
                    $('<ul>'),
                    $('<ul>').attr('id', 'pagination').css('display', 'flex')
                );
            }
            function addNewArticle(id, title, snippet) {
                const li = $('<li>');
                const p1 = $('<p>').append(
                    $('<span>').text(id + ' - '),
                    $('<b>').text(title)
                );
                const p2 = $('<p>').html(snippet);
                li.append(p1, p2);
                $('ul:first').append(li);
            }
            function queryWikipedia(search, offset = 0) {
                const data = {
                    action: "query",
                    list: "search",
                    srsearch: search,
                    format: "json",
                    origin: "*"
                };
                $.get("https://en.wikipedia.org/w/api.php", data, function (result) {
                    $('ul:first').html('');
                    result.query.search.forEach(function (article) {
                        addNewArticle(
                            article.pageid,
                            article.title,
                            article.snippet
                        );
                    });
                    buildPagination(
                        result.query.searchinfo.totalhits,
                        10,
                        offset
                    );
                });
            }
            function buildPagination(numberOfItems, itemsPerPage, currentOffset) {
                $('#pagination').html('');
                const totalPages = Math.ceil(numberOfItems / itemsPerPage);
                for (let i = 0; i < totalPages; i++) {
                    const pageNumber = i + 1;
                    const li = $('<li>')
                        .text(pageNumber)
                        .css({
                            listStyle: 'none',
                            cursor: 'pointer',
                            marginLeft: '10px',
                            fontWeight: (i * itemsPerPage === currentOffset) ? 'bold' : 'normal'
                        })
                        .click(function () {
                            const search = $('input:first').val();
                            queryWikipedia(search, i * itemsPerPage);
                        });
                    $('#pagination').append(li);
                }
            }
            window.onload = function () {
                createSearchForm();
            };
        </script>
    </head>
    <body></body>
</html>
