<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8" />
        <title>Task 3</title>
        <!-- jQuery Slim & Minified -->
        <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js"></script>
        <script type="application/javascript">
            function createFamilyTree() {
                $('body')
                    .append(
                        $('<table>')
                            .append(
                                $('<thead>')
                                    .append(
                                        $('<tr>')
                                            .append($('<th>').text('Firstname'), $('<th>').text('Lastname'))
                                    )
                            )
                            .append(
                                $('<tbody>')
                                    .append(
                                        $('<tr>')
                                            .append($('<td>').text('Guillaume'), $('<td>').text('Salva'))
                                    )
                                    .append(
                                        $('<tr>')
                                            .append($('<td>').text('Paulette'), $('<td>').text('Salva'))
                                    )
                                    .append(
                                        $('<tr>')
                                            .append($('<td>').text('Antoine'), $('<td>').text('Salva'))
                                    )
                            )
                    );
            }
            $(document).ready(function () {
                createFamilyTree();
            });
        </script>
    </head>
    <body></body>
</html>
