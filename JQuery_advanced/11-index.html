<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8" />
        <title>Task 11</title>
        <!-- jQuery Minified with AJAX -->
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script type="application/javascript">
            function addPostRow(data) {
                $('body').append(
                    $('<p>').append(
                        $('<span>').text(
                            'Post created with id ' + data.id +
                            ', title: ' + data.title +
                            ', author: ' + data.author
                        )
                    )
                );
            }
            function listPosts() {
                $.get('http://localhost:3000/posts')
                    .done(function (response) {
                        response.forEach(function (post) {
                            addPostRow(post);
                        });
                    })
                    .fail(function () {
                        alert('Server Error');
                    });
            }
            function buildForm() {
                const form = $('<form>');
                const divAuthor = $('<div>').append(
                    $('<label>')
                        .attr('for', 'author')
                        .text('Author'),
                    $('<input>')
                        .attr({
                            type: 'text',
                            id: 'author'
                        })
                );
                const divTitle = $('<div>').append(
                    $('<label>')
                        .attr('for', 'title')
                        .text('Title'),
                    $('<textarea>')
                        .attr('id', 'title')
                );
                const submit = $('<input>')
                    .attr('type', 'submit');
                form.append(divAuthor, divTitle, submit);
                form.submit(function (event) {
                    event.preventDefault();
                    sendForm();
                });
                $('body').append(form);
            }
            function sendForm() {
                $('form').after('About to send the query to the API');
                const data = {
                    title: $('#title').val(),
                    author: $('#author').val()
                };
                $.post('http://localhost:3000/posts', data)
                    .done(function (response) {
                        addPostRow(response);
                    })
                    .fail(function () {
                        alert('Error sending the POST query');
                    });
            }
            window.onload = function () {
                listPosts();
                buildForm();
            };
        </script>
    </head>
    <body></body>
</html>
