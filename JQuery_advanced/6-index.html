<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8" />
        <title>Task 6</title>
        <!-- jQuery Slim & Minified -->
        <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js"></script>
        <script type="application/javascript">
            function createFamilyTree() {
                $('body')
                    .append(
                        $('<table>')
                            .append(
                                $('<thead>')
                                    .append(
                                        $('<tr>')
                                            .append($('<th>').text('Firstname'), $('<th>').text('Lastname'))
                                    )
                            )
                            .append(
                                $('<tbody>')
                            )
                    );
            }
            function addNewMember(firstName, lastName, position) {
                const row = $('<tr>')
                .append($('<td>').text(firstName))
                .append($('<td>').text(lastName))
                .append(
                    $('<td>')
                        .text('(x)')
                        .css('background-color', 'orange')
                        .click(function () {
                            $(this).parent().remove();
                        })
                );
                if (position === 'before') {
                    $('tbody').prepend(row);
                } else {
                    $('tbody').append(row);
                }
            }
            function createForm() {
                $('table').before(
                    $('<input>').attr('type', 'text'),
                    $('<input>').attr('type', 'text'),
                    $('<select>')
                        .append($('<option>').val('before').text('Before'))
                        .append($('<option>').val('after').text('After')),
                    $('<input>').attr('type', 'submit')
                        .click(function () {
                            const firstName = $('input:first').val();
                            const lastName = $('input:nth-of-type(2)').val();
                            const position = $('select').val();
                            addNewMember(firstName, lastName, position);
                        })
                );
            }
            $(document).ready(function () {
                createFamilyTree();
                createForm();
            });
        </script>
    </head>
    <body></body>
</html>
