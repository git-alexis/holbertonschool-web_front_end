<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8" />
        <title>Task 4</title>
        <!-- jQuery Slim & Minified -->
        <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js"></script>
        <script type="application/javascript">
            function createFamilyTree() {
                $('body')
                    .append(
                        $('<table>')
                            .append(
                                $('<thead>')
                                    .append(
                                        $('<tr>')
                                            .append($('<th>').text('Firstname'), $('<th>').text('Lastname'))
                                    )
                            )
                            .append(
                                $('<tbody>')
                            )
                    );
            }
            function addNewMember(firstName, lastName) {
                const row = $('<tr>')
                .append($('<td>').text(firstName))
                .append($('<td>').text(lastName))
                .append(
                    $('<td>')
                        .text('(x)')
                        .css('background-color', 'orange')
                        .click(function () {
                            $(this).parent().remove();
                        })
                );
                $('tbody').append(row);
            }
            $(document).ready(function () {
                createFamilyTree();
                addNewMember('Guillaume', 'Salva');
                addNewMember('Arielle', 'Snizt');
                addNewMember('Fanette', 'Snizt');
                addNewMember('Gerard', 'Snizt');
                addNewMember('Victor', 'Salva');
            });
        </script>
    </head>
    <body></body>
</html>
